<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gorillas Mobile - 1 Jugador</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0000a8; /* Azul clásico */
            color: #ffffff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Encabezado con estado del juego */
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.4);
            font-weight: bold;
        }

        /* Contenedor del área de juego */
        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #0000a8;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Panel de control inferior optimizado para pulgares */
        #controles-tactiles {
            background: #111;
            border-top: 4px solid #fff;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            min-height: 160px;
        }

        .columna-control {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .label-control {
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .valor-control {
            font-size: 24px;
            font-weight: bold;
            color: #ffff54;
        }

        .botones-ajuste {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        /* Botones grandes para celular */
        .btn-accion {
            flex: 1;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            background: #222;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 8px;
            touch-action: manipulation;
        }
        .btn-accion:active {
            background: #fff;
            color: #000;
        }

        /* Botón de disparo gigante */
        .btn-fuego {
            width: 100%;
            height: 100%;
            background: #a80000;
            color: #fff;
            border: 4px solid #fff;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-fuego:active {
            background: #ffff54;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="intentos-txt">INTENTOS: ❤️❤️❤️</div>
        <div id="status-txt">¡APUNTA Y FUEGO!</div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controles-tactiles">
        <div class="columna-control">
            <div class="label-control">Ángulo</div>
            <div id="angulo-val" class="valor-control">45°</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('angulo', -5)">-</button>
                <button class="btn-accion" onclick="ajustar('angulo', 5)">+</button>
            </div>
        </div>

        <div class="columna-control">
            <button class="btn-fuego" onclick="lanzarBanana()">¡FUEGO!</button>
        </div>

        <div class="columna-control">
            <div class="label-control">Velocidad</div>
            <div id="velocidad-val" class="valor-control">60</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('velocidad', -5)">-</button>
                <button class="btn-accion" onclick="ajustar('velocidad', 5)">+</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("canvas-container");

        // Variables de lógica de 1 jugador
        let intentos = 3;
        let angulo = 45;
        let velocidad = 60;

        let edificios = [];
        let jugador = { x: 0, y: 0, ancho: 24, alto: 24 };
        let objetivo = { x: 0, y: 0, ancho: 24, alto: 24 };
        let banana = { x: 0, y: 0, vx: 0, vy: 0, activa: false };
        const gravedad = 0.15;

        // Ajustar el tamaño del canvas dinámicamente según la pantalla del celular
        function redimensionarCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            generarCiudad();
            dibujar();
        }

        // Generar edificios adaptados al ancho disponible
        function generarCiudad() {
            edificios = [];
            let xActual = 0;
            const minAncho = 50;
            const maxAncho = 90;

            while (xActual < canvas.width) {
                let anchoEdificio = Math.floor(Math.random() * (maxAncho - minAncho)) + minAncho;
                let altoEdificio = Math.floor(Math.random() * (canvas.height * 0.5)) + (canvas.height * 0.25);
                
                if (xActual + anchoEdificio > canvas.width) {
                    anchoEdificio = canvas.width - xActual;
                }

                edificios.push({
                    x: xActual,
                    y: canvas.height - altoEdificio,
                    ancho: anchoEdificio,
                    alto: altoEdificio
                });
                xActual += anchoEdificio;
            }

            // El jugador se ubica en el segundo edificio
            if(edificios.length > 3) {
                let eJugador = edificios[1];
                jugador.x = eJugador.x + (eJugador.ancho / 2) - 12;
                jugador.y = eJugador.y - 24;

                // El objetivo se ubica en el penúltimo edificio
                let eObjetivo = edificios[edificios.length - 2];
                objetivo.x = eObjetivo.x + (eObjetivo.ancho / 2) - 12;
                objetivo.y = eObjetivo.y - 24;
            }
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar edificios
            ctx.fillStyle = "#a8a8a8";
            edificios.forEach(e => {
                ctx.fillRect(e.x, e.y, e.ancho, e.alto);
            });

            // Dibujar Jugador (Azul cyan)
            ctx.fillStyle = "#00a8a8";
            ctx.fillRect(jugador.x, jugador.y, jugador.ancho, jugador.alto);

            // Dibujar Objetivo (Rojo)
            ctx.fillStyle = "#a80000";
            ctx.fillRect(objetivo.x, objetivo.y, objetivo.ancho, objetivo.alto);

            // Dibujar proyectil
            if (banana.activa) {
                ctx.fillStyle = "#ffff54";
                ctx.beginPath();
                ctx.arc(banana.x, banana.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Modificar parámetros con los botones táctiles (+ y -)
        function ajustar(tipo, valor) {
            if (tipo === 'angulo') {
                angulo = Math.max(0, Math.min(90, angulo + valor));
                document.getElementById("angulo-val").innerText = angulo + "°";
            } else if (tipo === 'velocidad') {
                velocidad = Math.max(10, Math.min(120, velocidad + valor));
                document.getElementById("velocidad-val").innerText = velocidad;
            }
        }

        function lanzarBanana() {
            if (banana.activa) return;

            banana.activa = true;
            document.getElementById("status-txt").innerText = "¡EN EL AIRE!";

            const radianes = (angulo * Math.PI) / 180;
            banana.x = jugador.x + 12;
            banana.y = jugador.y - 8;
            
            // Factor de escala adaptado dinámicamente al ancho de la pantalla
            const escalaFisica = canvas.width * 0.00025;
            banana.vx = Math.cos(radianes) * velocidad * escalaFisica;
            banana.vy = -Math.sin(radianes) * velocidad * escalaFisica;

            actualizarFisica();
        }

        function actualizarFisica() {
            if (!banana.activa) return;

            banana.x += banana.vx;
            banana.vy += gravedad;
            banana.y += banana.vy;

            // Falla por salir del mapa
            if (banana.x < 0 || banana.x > canvas.width || banana.y > canvas.height) {
                procesarFallo();
                return;
            }

            // Impacto en el objetivo (Victoria)
            if (detectarColision(banana, objetivo)) {
                document.getElementById("status-txt").innerText = "¡LE DISTE! GANASTE 🎉";
                setTimeout(() => {
                    intentos = 3;
                    actualizarHUD();
                    redimensionarCanvas(); 
                }, 2000);
                return;
            }

            // Choque contra un edificio
            for (let e of edificios) {
                if (banana.x > e.x && banana.x < e.x + e.ancho && banana.y > e.y) {
                    procesarFallo();
                    return;
                }
            }

            dibujar();
            requestAnimationFrame(actualizarFisica);
        }

        function detectarColision(b, obj) {
            return b.x > obj.x && b.x < obj.x + obj.ancho && b.y > obj.y && b.y < obj.y + obj.alto;
        }

        function procesarFallo() {
            banana.activa = false;
            intentos--;
            actualizarHUD();

            if (intentos <= 0) {
                document.getElementById("status-txt").innerText = "¡GAME OVER! REINICIANDO...";
                setTimeout(() => {
                    intentos = 3;
                    actualizarHUD();
                    redimensionarCanvas(); // Recrea toda la ciudad y posiciones
                }, 2000);
            } else {
                document.getElementById("status-txt").innerText = "¡FALLASTE! INTENTA OTRA VEZ";
                dibujar();
            }
        }

        function actualizarHUD() {
            let corazones = "";
            for(let i=0; i<3; i++) {
                corazones += (i < intentos) ? "❤️" : "🖤";
            }
            document.getElementById("intentos-txt").innerText = `INTENTOS: ${corazones}`;
        }

        // Oyentes de eventos para redimensionar la app correctamente
        window.addEventListener('resize', redimensionarCanvas);
        window.addEventListener('orientationchange', () => setTimeout(redimensionarCanvas, 200));

        // Inicialización
        redimensionarCanvas();
    </script>
</body>
</html>
