<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gorillas Arcade Mobile - Gran Banana</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.6);
            font-weight: bold;
            z-index: 10;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: bottom center;
        }

        #controles-tactiles {
            background: #111;
            border-top: 4px solid #fff;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            min-height: 160px;
            z-index: 10;
        }

        .columna-control {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .label-control {
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .valor-control {
            font-size: 24px;
            font-weight: bold;
            color: #ffff54;
        }

        .botones-ajuste {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-accion {
            flex: 1;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            background: #222;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 8px;
            touch-action: manipulation;
        }
        .btn-accion:active {
            background: #fff;
            color: #000;
        }

        .btn-fuego {
            width: 100%;
            height: 100%;
            background: #a80000;
            color: #fff;
            border: 4px solid #fff;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-fuego:active {
            background: #ffff54;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="intentos-txt">INTENTOS: ❤️❤️❤️</div>
        <div id="status-txt">¡TOCA FUEGO PARA EMPEZAR!http://googleusercontent.com/image_generation_content/0
