<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gorillas & Bananas por LeoClates</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0000a8;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        #retro-header {
            background: #000;
            border-bottom: 3px double #fff;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            z-index: 15;
        }
        #retro-header h1 {
            font-size: 18px;
            color: #ffff54;
            text-shadow: 2px 2px #a80000;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #retro-header .credito {
            font-size: 11px;
            color: #54ffff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            font-weight: bold;
            border-bottom: 1px solid #fff;
            z-index: 15;
            min-height: 32px;
        }

        #intentos-txt {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #0000a8;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: bottom center;
        }

        #controles-tactiles {
            background: #000;
            border-top: 4px solid #fff;
            padding: 10px 10px 20px 10px;
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr;
            gap: 10px;
            min-height: 135px;
            z-index: 15;
        }

        .columna-control {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .label-control {
            font-size: 11px;
            text-transform: uppercase;
            color: #a8a8a8;
            font-weight: bold;
        }

        .valor-control {
            font-size: 20px;
            font-weight: bold;
            color: #ffff54;
        }

        .botones-ajuste {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .btn-accion {
            flex: 1;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            background: #222;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 6px;
            touch-action: manipulation;
        }
        .btn-accion:active {
            background: #fff;
            color: #000;
        }

        .btn-fuego {
            width: 100%;
            height: 85%;
            background: #a80000;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            touch-action: manipulation;
            box-shadow: inset -2px -2px #000;
        }
        .btn-fuego:active {
            background: #ffff54;
            color: #000;
            box-shadow: none;
        }

        @media (orientation: landscape) {
            #retro-header {
                flex-direction: row;
                justify-content: space-between;
                padding: 4px 15px;
            }
            #retro-header h1 { font-size: 15px; }
            #retro-header .credito { font-size: 10px; }
            #controles-tactiles {
                min-height: 115px;
                padding: 5px 10px 10px 10px;
            }
            .btn-accion { padding: 6px 0; }
        }
    </style>
</head>
<body>

    <div id="retro-header">
        <h1>GORILAS & BANANAS</h1>
        <div class="credito">BY LEOCLATES</div>
    </div>

    <div id="hud">
        <div id="intentos-txt">INTENTOS: <span id="marcador-bananas" style="color: #ffff54; letter-spacing: 2px;"></span></div>
        <div id="status-txt">CALIBRA TU TIRO Y ¡FUEGO!</div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controles-tactiles">
        <div class="columna-control">
            <div class="label-control">Ángulo</div>
            <div id="angulo-val" class="valor-control">45°</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('angulo', -5)">-</button>
                <button class="btn-accion" onclick="ajustar('angulo', 5)">+</button>
            </div>
        </div>

        <div class="columna-control">
            <button class="btn-fuego" onclick="lanzarBanana()">¡FUEGO!</button>
        </div>

        <div class="columna-control">
            <div class="label-control">Velocidad</div>
            <div id="velocidad-val" class="valor-control">60</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('velocidad', -5)">-</button>
                <button class="btn-accion" onclick="ajustar('velocidad', 5)">+</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("canvas-container");

        // Audio
        let audioCtx = null;
        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function sonarRetro(frecuenciaInicial, frecuenciaFinal, duracion, tipo = 'square') {
            try {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = tipo;
                osc.frequency.setValueAtTime(frecuenciaInicial, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(frecuenciaFinal, audioCtx.currentTime + duracion);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duracion);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duracion);
            } catch(e) {}
        }

        // Carga de imágenes
        const imgGorilaQuieto = new Image(); imgGorilaQuieto.src = 'gorila_quieto.png';
        const imgGorilaLanza = new Image(); imgGorilaLanza.src = 'gorila_lanza.png';
        const imgGorilaObjetivo = new Image(); imgGorilaObjetivo.src = 'gorila_objetivo.png';
        const imgGorilaDerrotado = new Image(); imgGorilaDerrotado.src = 'gorila_derrotado.png';
        const imgBanana = new Image(); imgBanana.src = 'banana.png';

        let intentos = 5;
        let angulo = 45;
        let velocidad = 60;
        let edificios = [];
        let bloqueado = false;
        
        let jugador = { x: 0, y: 0, ancho: 40, alto: 40, estado: 'quieto' };
        let objetivo = { x: 0, y: 0, ancho: 40, alto: 40, estado: 'vivo' };
        let banana = { x: 0, y: 0, vx: 0, vy: 0, activa: false, anguloRotacion: 0 };
        const gravedad = 0.15;

        let ultimoImpacto = { x: null, y: null, visible: false };

        function redimensionarCanvas() {
            if (!container) return;
            canvas.width = container.clientWidth || window.innerWidth;
            canvas.height = container.clientHeight || 300;
            
            if (edificios.length === 0) {
                generarCiudad();
            } else {
                reubicarPersonajes();
            }
            dibujar();
        }

        function generarCiudad() {
            edificios = [];
            let xActual = 0;
            const minAncho = 60;
            const maxAncho = 100;

            while (xActual < canvas.width) {
                let anchoEdificio = Math.floor(Math.random() * (maxAncho - minAncho)) + minAncho;
                let altoEdificio = Math.floor(Math.random() * (canvas.height * 0.4)) + (canvas.height * 0.2);
                
                if (xActual + anchoEdificio > canvas.width) {
                    anchoEdificio = canvas.width - xActual;
                }

                edificios.push({
                    x: xActual,
                    y: canvas.height - altoEdificio,
                    ancho: anchoEdificio,
                    alto: altoEdificio
                });
                xActual += anchoEdificio;
            }
            reubicarPersonajes();
        }

        function reubicarPersonajes() {
            if (edificios.length > 3) {
                let eJugador = edificios[1];
                jugador.x = eJugador.x + (eJugador.ancho / 2) - 20;
                jugador.y = eJugador.y - 40;

                let eObjetivo = edificios[edificios.length - 2];
                objetivo.x = eObjetivo.x + (eObjetivo.ancho / 2) - 20;
                objetivo.y = eObjetivo.y - 40;
            }
        }

        function dibujar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.font = "bold 11px monospace";
            ctx.fillText("▲ MIRA EL CUADRO ROJO ANTERIOR PARA CORREGIR", 15, 20);

            // Edificios
            ctx.fillStyle = "rgba(70, 70, 70, 0.9)";
            edificios.forEach(e => {
                ctx.fillRect(e.x, e.y, e.ancho, e.alto);
            });

            // Marca de impacto
            if (ultimoImpacto.visible) {
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(ultimoImpacto.x - 6, ultimoImpacto.y - 6, 12, 12);
                ctx.strokeStyle = "#ffffff";
                ctx.strokeRect(ultimoImpacto.x - 6, ultimoImpacto.y - 6, 12, 12);
            }

            // Jugador
            let imgActual = (jugador.estado === 'lanza') ? imgGor
