<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gorillas & Bananas por LeoClates</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0000a8;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Encabezado Responsivo: Se adapta perfecto en vertical y horizontal */
        #retro-header {
            background: #000;
            border-bottom: 3px double #fff;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        #retro-header h1 {
            font-size: 18px;
            color: #ffff54;
            text-shadow: 2px 2px #a80000;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #retro-header .credito {
            font-size: 11px;
            color: #54ffff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            font-weight: bold;
            border-bottom: 1px solid #fff;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: bottom center;
        }

        #controles-tactiles {
            background: #000;
            border-top: 4px solid #fff;
            padding: 10px 10px 20px 10px;
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr;
            gap: 10px;
            min-height: 135px;
            z-index: 10;
        }

        .columna-control {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .label-control {
            font-size: 11px;
            text-transform: uppercase;
            color: #a8a8a8;
            font-weight: bold;
        }

        .valor-control {
            font-size: 20px;
            font-weight: bold;
            color: #ffff54;
        }

        .botones-ajuste {
            display: flex;
            gap: 6px;
            width: 100%;
        }

            flex: 1;
            padding: 10px 0;
